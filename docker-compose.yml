services:
  roslyn-mcp:
    build:
      context: .
      args:
        ROSLYN_MCP_VERSION: latest
    image: roslyn-mcp:latest
    stdin_open: true  # Required for MCP stdio transport
    tty: true
    volumes:
      # Mount code directory at same path for correct file locations
      - ${CODE_PATH:-/Users/helgereneurholm/git}:${CODE_PATH:-/Users/helgereneurholm/git}
      # Mount NuGet cache read-only
      - ${NUGET_PACKAGES:-~/.nuget/packages}:/root/.nuget/packages:ro
